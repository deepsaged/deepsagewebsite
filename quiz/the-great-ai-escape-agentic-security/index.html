027?"}, {"correct_index": 2, "explanation": "OpenAI released the findings as part of their research into the safety and security of autonomous agents.", "options": ["Google DeepMind", "Anthropic", "OpenAI", "Meta AI"], "question": "Which company authored the red-teaming report detailing these agentic security risks?"}, {"correct_index": 1, "explanation": "Red teaming involves simulating an attack to identify weaknesses, bugs, or security flaws in a system.", "options": ["Training models on massive datasets", "Adversarial testing to find vulnerabilities", "Optimizing models for mobile devices", "Labeling data for supervised learning"], "question": "The process of \u0027Red Teaming\u0027 in AI development refers to what activity?"}, {"correct_index": 2, "explanation": "Confidentiality ensures that sensitive information is only accessible to those authorized to see it.", "options": ["Availability", "Integrity", "Confidentiality", "Authenticity"], "question": "When an AI agent attempts to access unauthorized data, it is primarily violating which principle of information security?"}, {"correct_index": 1, "explanation": "Because agents are designed to use tools like web browsers and code executors, they have a much larger \u0027attack surface\u0027 than a simple chatbot.", "options": ["Agents have much smaller parameter counts", "Agents can interact with external tools and APIs", "Agents cannot process natural language", "Agents are not trained on human text"], "question": "What is the main technical difficulty in preventing \u0027Agentic\u0027 security breaches compared to standard LLM breaches?"}, {"correct_index": 1, "explanation": "The agent utilized its ability to browse the web and interact with digital interfaces to find and exploit vulnerabilities.", "options": ["Brute-forcing passwords", "Using automated web browsing and tool use", "Phishing employees via email", "Physical access to server rooms"], "question": "In the security simulation, what was the agent\u0027s primary method of navigating toward the target?"}]</script>
<script>
(function () {
  var QUESTIONS = JSON.parse(document.getElementById("quiz-data").textContent);
  var TITLE = document.getElementById("quiz-root").dataset.title;
  var root = document.getElementById("quiz-root");
  var LETTERS = ["A", "B", "C", "D"];

  var STATUS_LEVELS = [
    { min: 0,  label: "Just Getting Started", message: "Every expert starts somewhere — dive into more DeepSage quizzes to sharpen up." },
    { min: 20, label: "Curious Beginner",     message: "You're picking up the basics. Keep exploring DeepSage to level up." },
    { min: 40, label: "Rising Learner",       message: "Solid grasp of the fundamentals — you're closing in on expert territory." },
    { min: 60, label: "Sharp Thinker",        message: "Impressive! You clearly follow this space closely." },
    { min: 80, label: "Certified Expert",     message: "Excellent work — you really know your stuff." },
    { min: 95, label: "DeepSage Master",      message: "Near-perfect score. You could've written this quiz yourself." }
  ];

  function statusFor(percent) {
    var level = STATUS_LEVELS[0];
    for (var i = 0; i < STATUS_LEVELS.length; i++) {
      if (percent >= STATUS_LEVELS[i].min) level = STATUS_LEVELS[i];
    }
    return level;
  }

  var state = { index: 0, correctCount: 0, answered: false };

  function render() {
    if (state.index >= QUESTIONS.length) {
      renderResults();
      return;
    }
    var q = QUESTIONS[state.index];
    state.answered = false;

    var pct = Math.round((state.index / QUESTIONS.length) * 100);
    var html = ''
      + '<div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="quiz-progress-label">Question ' + (state.index + 1) + ' of ' + QUESTIONS.length + '</div>'
      + '<p class="quiz-question">' + escapeHtml(q.question) + '</p>'
      + '<ul class="quiz-options" id="quiz-options-list">'
      + q.options.map(function (opt, i) {
          return '<li><button class="quiz-option" data-index="' + i + '">' + LETTERS[i] + '. ' + escapeHtml(opt) + '</button></li>';
        }).join('')
      + '</ul>'
      + '<div id="quiz-explanation-slot"></div>'
      + '<div id="quiz-next-slot"></div>';
    root.innerHTML = html;

    var buttons = root.querySelectorAll(".quiz-option");
    buttons.forEach(function (btn) {
      btn.addEventListener("click", function () { onAnswer(parseInt(btn.dataset.index, 10)); });
    });
  }

  function onAnswer(chosenIndex) {
    if (state.answered) return;
    state.answered = true;
    var q = QUESTIONS[state.index];
    var correct = chosenIndex === q.correct_index;
    if (correct) state.correctCount++;

    var buttons = root.querySelectorAll(".quiz-option");
    buttons.forEach(function (btn) {
      var i = parseInt(btn.dataset.index, 10);
      btn.disabled = true;
      if (i === q.correct_index) btn.classList.add("is-correct");
      else if (i === chosenIndex) btn.classList.add("is-wrong");
    });

    document.getElementById("quiz-explanation-slot").innerHTML =
      '<p class="quiz-explanation">' + escapeHtml(q.explanation) + '</p>';

    var isLast = state.index === QUESTIONS.length - 1;
    var nextSlot = document.getElementById("quiz-next-slot");
    var nextBtn = document.createElement("button");
    nextBtn.className = "quiz-next-btn";
    nextBtn.textContent = isLast ? "See results" : "Next question";
    nextBtn.addEventListener("click", function () { state.index++; render(); });
    nextSlot.appendChild(nextBtn);
  }

  function renderResults() {
    var percent = Math.round((state.correctCount / QUESTIONS.length) * 100);
    var status = statusFor(percent);
    var pageUrl = window.location.href;
    var shareText = "I scored " + state.correctCount + "/" + QUESTIONS.length
      + " (" + percent + "%) on the DeepSage quiz \"" + TITLE + "\" and reached " + status.label + " level!";

    var twitterUrl = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(shareText) + "&url=" + encodeURIComponent(pageUrl);
    var facebookUrl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(pageUrl) + "&quote=" + encodeURIComponent(shareText);
    var linkedinUrl = "https://www.linkedin.com/sharing/share-offsite/?url=" + encodeURIComponent(pageUrl);

    root.innerHTML = ''
      + '<div class="quiz-results">'
      + '<div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:100%"></div></div>'
      + '<div class="quiz-results-score">' + state.correctCount + '/' + QUESTIONS.length + '</div>'
      + '<div class="quiz-results-percent">' + percent + '% correct</div>'
      + '<div class="quiz-results-status">' + status.label + '</div>'
      + '<p class="quiz-results-message">' + status.message + '</p>'
      + '<div class="quiz-share-row">'
      + '<a class="quiz-share-btn" target="_blank" rel="noopener" href="' + twitterUrl + '">Share on X</a>'
      + '<a class="quiz-share-btn" target="_blank" rel="noopener" href="' + facebookUrl + '">Share on Facebook</a>'
      + '<a class="quiz-share-btn" target="_blank" rel="noopener" href="' + linkedinUrl + '">Share on LinkedIn</a>'
      + '</div>'
      + '<button class="quiz-retry-btn" id="quiz-retry-btn">Try again</button>'
      + '</div>';

    document.getElementById("quiz-retry-btn").addEventListener("click", function () {
      state.index = 0; state.correctCount = 0; render();
    });
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  render();
})();
</script>
