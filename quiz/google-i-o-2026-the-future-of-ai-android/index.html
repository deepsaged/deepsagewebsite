<script id="quiz-data" type="application/json">[{"correct_index": 1, "explanation": "As with most recent tech summits, Generative AI remains the undisputed protagonist of the Google ecosystem.", "options": ["Quantum Computing", "Generative AI", "Augmented Reality", "Blockchain Integration"], "question": "Which core technology served as the primary focus of the Google I/O 2026 keynote presentations?"}, {"correct_index": 0, "explanation": "The Gemini series continues to evolve, with the 2.0 update focusing on improved reasoning and multimodal capabilities.", "options": ["Gemini 2.0", "PaLM 2 Ultra", "AlphaGo Next", "Bard Pro"], "question": "What is the name of the updated, multimodal Large Language Model (LLM) family introduced during the keynote?"}, {"correct_index": 1, "explanation": "Circle to Search has expanded beyond simple image identification to include deep semantic analysis of video frames.", "options": ["Android Vision", "Circle to Search Plus", "Pixel Recap", "VideoLens AI"], "question": "Which Android feature was highlighted for its ability to \u0027summarize\u0027 long video content in real-time?"}, {"correct_index": 1, "explanation": "Project Astra represents Google\u0027s push toward AI agents that can see, hear, and act autonomously across apps.", "options": ["Auto-Tasker", "Project Astra", "TaskMaster AI", "Google Flow"], "question": "Google announced a new \u0027Agentic\u0027 framework designed to allow AI to perform multi-step tasks. What is this called?"}, {"correct_index": 2, "explanation": "Integrating Gemini directly into the IDE helps developers write, debug, and optimize code using natural language.", "options": ["CodeMagic", "Studio Bot 2.0", "Gemini in Android Studio", "Auto-Debug Pro"], "question": "In the context of developer tools, what new feature was added to Android Studio to assist with AI-driven coding?"}, {"correct_index": 2, "explanation": "The update to Pixel Buds focuses on real-time, low-latency translation and environmental awareness.", "options": ["Pixel Tablet Pro", "Nest Hub Gen 5", "Pixel Buds Pro 2", "Chromecast Ultra"], "question": "Which hardware integration was showcased to demonstrate \u0027Ambient Computing\u0027 during the keynote?"}, {"correct_index": 2, "explanation": "Context Caching allows developers to reduce costs and latency by storing frequently used information in the model\u0027s active memory.", "options": ["LongTerm Memory", "Infinite Context API", "Context Caching", "Smart Buffer"], "question": "Google introduced a new way for developers to manage \u0027Context Windows\u0027 in their LLM applications. What is this feature called?"}, {"correct_index": 1, "explanation": "The new NPU driver optimizes how the Android OS communicates with the specialized hardware for AI processing.", "options": ["Introduction of Neural-Kernel", "AI-Optimized NPU Driver", "Tensor-Core Integration", "Unified Memory Architecture"], "question": "What major change was announced regarding the \u0027Android Kernel\u0027 to improve efficiency for AI workloads on mobile?"}, {"correct_index": 0, "explanation": "Vertex AI remains the flagship platform for enterprise-grade machine learning and model management.", "options": ["Vertex AI", "BigQuery ML", "Cloud TPU Studio", "Firebase AI"], "question": "Which Google Cloud service received a major update to allow for easier \u0027Fine-Tuning\u0027 of models by enterprise customers?"}, {"correct_index": 2, "explanation": "Agentic workflows aim to move AI from being a \u0027chatbot\u0027 you talk to, to an \u0027agent\u0027 that completes tasks on your behalf.", "options": ["Replacing all human users", "Automating repetitive API calls", "Autonomous execution of complex, multi-app tasks", "Increasing the number of Google Ads"], "question": "The keynote concluded with a vision of \u0027Agentic Workflows\u0027. What is the primary goal of this workflow concept?"}]</script>
<script>
(function () {
  var QUESTIONS = JSON.parse(document.getElementById("quiz-data").textContent);
  var TITLE = document.getElementById("quiz-root").dataset.title;
  var root = document.getElementById("quiz-root");
  var LETTERS = ["A", "B", "C", "D", "E", "F"];

  var STATUS_LEVELS = [
    { min: 0,  label: "Just Getting Started", message: "Every expert starts somewhere — dive into more DeepSage quizzes to sharpen up." },
    { min: 20, label: "Curious Beginner",     message: "You're picking up the basics. Keep exploring DeepSage to level up." },
    { min: 40, label: "Rising Learner",       message: "Solid grasp of the fundamentals — you're closing in on expert territory." },
    { min: 60, label: "Sharp Thinker",        message: "Impressive! You clearly follow this space closely." },
    { min: 80, label: "Certified Expert",     message: "Excellent work — you really know your stuff." },
    { min: 95, label: "DeepSage Master",      message: "Near-perfect score. You could've written this quiz yourself." }
  ];

  function statusFor(percent) {
    var level = STATUS_LEVELS[0];
    for (var i = 0; i < STATUS_LEVELS.length; i++) {
      if (percent >= STATUS_LEVELS[i].min) level = STATUS_LEVELS[i];
    }
    return level;
  }

  function shareButtonsHtml(shareText) {
    var pageUrl = window.location.href;
    var twitterUrl = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(shareText) + "&url=" + encodeURIComponent(pageUrl);
    var facebookUrl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(pageUrl) + "&quote=" + encodeURIComponent(shareText);
    var linkedinUrl = "https://www.linkedin.com/sharing/share-offsite/?url=" + encodeURIComponent(pageUrl);
    return ''
      + '<a class="share-btn" target="_blank" rel="noopener" href="' + twitterUrl + '" aria-label="Share on X" title="Share on X">'
      + '<svg viewBox="0 0 24 24"><path d="M18.9 2H22l-7.6 8.7L23.3 22H16.9l-5-6.5-5.7 6.5H2.9l8.1-9.3L2 2h6.6l4.5 5.9L18.9 2Zm-1.1 18h1.7L7.3 3.9H5.5L17.8 20Z"/></svg>'
      + '</a>'
      + '<a class="share-btn" target="_blank" rel="noopener" href="' + facebookUrl + '" aria-label="Share on Facebook" title="Share on Facebook">'
      + '<svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12Z"/></svg>'
      + '</a>'
      + '<a class="share-btn" target="_blank" rel="noopener" href="' + linkedinUrl + '" aria-label="Share on LinkedIn" title="Share on LinkedIn">'
      + '<svg viewBox="0 0 24 24"><path d="M19 3A2 2 0 0 1 21 5v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14ZM8.3 18.5V10H5.7v8.5h2.6ZM7 8.8a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Zm11.5 9.7v-4.7c0-2.5-1.3-3.7-3.1-3.7-1.4 0-2 .8-2.4 1.3V10H10.4v8.5H13v-4.7c0-.5 0-1 .2-1.3.3-.6.8-1.3 1.8-1.3 1.3 0 1.8.9 1.8 2.3v5h2.7Z"/></svg>'
      + '</a>';
  }

  var topShareRow = document.getElementById("share-row-top");
  if (topShareRow) topShareRow.innerHTML = shareButtonsHtml("Test your knowledge: " + TITLE);

  var state = { index: 0, points: 0, answered: false };

  function render() {
    if (state.index >= QUESTIONS.length) {
      renderResults();
      return;
    }
    var q = QUESTIONS[state.index];
    state.answered = false;

    var pct = Math.round((state.index / QUESTIONS.length) * 100);
    var html = ''
      + '<div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="quiz-progress-label">Question ' + (state.index + 1) + ' of ' + QUESTIONS.length + '</div>'
      + '<p class="quiz-question">' + escapeHtml(q.question) + '</p>'
      + '<ul class="quiz-options" id="quiz-options-list">'
      + q.options.map(function (opt, i) {
          return '<li><button class="quiz-option" data-index="' + i + '">' + LETTERS[i] + '. ' + escapeHtml(opt) + '</button></li>';
        }).join('')
      + '</ul>'
      + '<div id="quiz-explanation-slot"></div>'
      + '<div id="quiz-next-slot"></div>';
    root.innerHTML = html;

    var buttons = root.querySelectorAll(".quiz-option");
    buttons.forEach(function (btn) {
      btn.addEventListener("click", function () { onAnswer(parseInt(btn.dataset.index, 10)); });
    });
  }

  function onAnswer(chosenIndex) {
    if (state.answered) return;
    state.answered = true;
    var q = QUESTIONS[state.index];
    if (chosenIndex === q.correct_index) state.points += 1;
    else if (chosenIndex === q.idk_index) state.points += 0.5;

    var buttons = root.querySelectorAll(".quiz-option");
    buttons.forEach(function (btn) {
      var i = parseInt(btn.dataset.index, 10);
      btn.disabled = true;
      if (i === q.correct_index) btn.classList.add("is-correct");
      else if (i === q.idk_index && i === chosenIndex) btn.classList.add("is-idk");
      else if (i === chosenIndex) btn.classList.add("is-wrong");
    });

    document.getElementById("quiz-explanation-slot").innerHTML =
      '<p class="quiz-explanation">' + escapeHtml(q.explanation) + '</p>';

    var isLast = state.index === QUESTIONS.length - 1;
    var nextSlot = document.getElementById("quiz-next-slot");
    var nextBtn = document.createElement("button");
    nextBtn.className = "quiz-next-btn";
    nextBtn.textContent = isLast ? "See results" : "Next question";
    nextBtn.addEventListener("click", function () { state.index++; render(); });
    nextSlot.appendChild(nextBtn);
  }

  function formatScore(n) {
    return n % 1 === 0 ? String(n) : n.toFixed(1);
  }

  function renderResults() {
    var percent = Math.round((state.points / QUESTIONS.length) * 100);
    var status = statusFor(percent);
    var shareText = "I scored " + formatScore(state.points) + "/" + QUESTIONS.length
      + " (" + percent + "%) on the DeepSage quiz \"" + TITLE + "\" and reached " + status.label + " level!";

    root.innerHTML = ''
      + '<div class="quiz-results">'
      + '<div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:100%"></div></div>'
      + '<div class="quiz-results-score">' + formatScore(state.points) + '/' + QUESTIONS.length + '</div>'
      + '<div class="quiz-results-percent">' + percent + '% correct</div>'
      + '<div class="quiz-results-status">' + status.label + '</div>'
      + '<p class="quiz-results-message">' + status.message + '</p>'
      + '<div class="share-row">' + shareButtonsHtml(shareText) + '</div>'
      + '<button class="quiz-retry-btn" id="quiz-retry-btn">Try again</button>'
      + '</div>';

    document.getElementById("quiz-retry-btn").addEventListener("click", function () {
      state.index = 0; state.points = 0; render();
    });
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  render();
})();
</script>

      </div>

        <label for="auth-pass">Password</label>
        <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password">

<script>
let authMode = "signin";

function openAuthModal(mode) {
  switchAuthTab(mode || "signin");
  document.getElementById("auth-modal-overlay").style.display = "flex";
}

function closeAuthModal() {
  document.getElementById("auth-modal-overlay").style.display = "none";
}

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById("auth-tab-signin").classList.toggle("active", mode === "signin");
  document.getElementById("auth-tab-signup").classList.toggle("active", mode === "signup");
  document.getElementById("auth-submit-btn").textContent = mode === "signin" ? "Sign In" : "Create Account";
  const passInput = document.getElementById("auth-pass");
  passInput.autocomplete = mode === "signin" ? "current-password" : "new-password";
  setAuthMsg("");
}

function setAuthMsg(txt, color) {
  const el = document.getElementById("auth-msg");
  el.textContent = txt;
  el.style.color = color || "#ff6688";
}

async function authSubmit() {
  const sf = window._sf;
  if (!sf) return setAuthMsg("Firebase not initialized yet.");
  const email = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value;
  if (!email || !pass) return setAuthMsg("Please fill in all fields.");

  const btn = document.getElementById("auth-submit-btn");
  btn.textContent = "…";
  btn.disabled = true;

  try {
    if (authMode === "signin") {
      await sf.signInWithEmailAndPassword(sf.auth, email, pass);
    } else {
      await sf.createUserWithEmailAndPassword(sf.auth, email, pass);
    }
    setAuthMsg("");
    closeAuthModal();
  } catch (err) {
    const msgs = {
      "auth/user-not-found": "No account with that email.",
      "auth/wrong-password": "Incorrect password.",
      "auth/invalid-credential": "Incorrect email or password.",
      "auth/email-already-in-use": "Email already registered. Sign in instead.",
      "auth/weak-password": "Password must be at least 6 characters.",
      "auth/invalid-email": "Please enter a valid email.",
    };
    setAuthMsg(msgs[err.code] || err.message);
  } finally {
    btn.disabled = false;
    switchAuthTab(authMode);
  }
}

async function authGoogle() {
  const sf = window._sf;
  if (!sf) return setAuthMsg("Firebase not initialized yet.");
  try {
    await sf.signInWithPopup(sf.auth, sf.gProvider);
    closeAuthModal();
  } catch (err) {
    if (err.code !== "auth/popup-closed-by-user") setAuthMsg(err.message);
  }
}

async function doSignOut() {
  const sf = window._sf;
  if (sf) await sf.signOut(sf.auth);
}
</script>
