  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

    const auth = getAuth(app);
    const gProvider = new GoogleAuthProvider();

    window._sf = { auth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, gProvider, signInWithPopup };

    /* ── Auth state observer ── */
    onAuthStateChanged(auth, user => {
      const loggedOut = document.getElementById('auth-panel');
      const loggedIn  = document.getElementById('user-panel');
      const userName  = document.getElementById('user-name');
      if (!loggedOut || !loggedIn) return;
      if (user) {
        loggedOut.style.display = 'none';
        loggedIn.style.display  = 'flex';
        userName.textContent    = user.displayName || user.email || 'Explorer';
        trackWishlist(user.email);
      } else {
        loggedOut.style.display = 'flex';
        loggedIn.style.display  = 'none';
      }
    });

    function trackWishlist(email) {

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    :root {
      --teal:  #00ffcc;
      --blue:  #00aaff;
      --dark:  #000408;
      --text:  #c8e8ff;
      --muted: #4a7a8a;
      --serif: Georgia, 'Times New Roman', serif;
      --sans:  system-ui, -apple-system, sans-serif;
    }

    body {
      background: #000;
      color: var(--text);
      font-family: var(--serif);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── HERO SECTION ── */
    #hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
      background: #000;
    }

    /* Star canvas */
    #starCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Gradient overlays */
    .hero-grad-top {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 10%, #001828aa 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }
    .hero-grad-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(to top, #000 0%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── INNER LAYOUT ── */
    .hero-inner {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 860px;
      padding: 0 24px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── HEADER NAV ── */
    .site-nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 0;
    }

    .nav-logo {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #ffffff88;
      text-transform: uppercase;
    }

    .nav-auth {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid #00ffcc44;
      background: transparent;
      color: var(--teal);
      padding: 7px 16px;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-btn:hover { background: #00ffcc15; border-color: var(--teal); }
    .nav-btn--ghost { border-color: transparent; color: var(--muted); }
    .nav-btn--ghost:hover { color: var(--text); background: transparent; }

    /* ── VIDEO EMBED ── */
    .video-wrap {
      margin-top: 36px;
    }

    .video-wrap {
      width: 100%;
      max-width: 780px;
      position: relative;
      border: 1px solid #00ffcc22;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 60px #00ffcc0a, 0 0 120px #00aaff06;
    }

    .video-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--teal), transparent);
      opacity: 0.5;
      z-index: 2;
    }

    .video-ratio {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
    }

    .video-ratio iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── AUTH CARD ── */
    .auth-section {
      width: 100%;
      max-width: 480px;
      margin-top: 40px;
    }

    /* Auth panel (logged-out) */
    #auth-panel {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: #000d1888;
      border: 1px solid #00ffcc22;
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid #00ffcc15;
    }

    .auth-tab {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .auth-tab.active {
      color: var(--teal);
      background: #00ffcc08;
      border-bottom: 1px solid var(--teal);
      margin-bottom: -1px;
    }

    .auth-form-wrap {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .auth-field label {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 3px;
      color: #00ffcc44;
      text-transform: uppercase;
    }

    .auth-field input {
      background: #000e18;
      border: 1px solid #00ffcc22;
      border-radius: 2px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--serif);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .auth-field input:focus { border-color: var(--teal); }
    .auth-field input::placeholder { color: #1a4050; }

    .auth-submit {
      background: linear-gradient(135deg, var(--teal), var(--blue));
      border: none;
      padding: 13px;
      color: #000d18;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .auth-submit:hover { opacity: 0.85; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #00ffcc15;
    }

    .auth-divider span {
      font-family: var(--sans);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .google-btn {
      background: transparent;
      border: 1px solid #00ffcc22;
      border-radius: 2px;
      padding: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 2px;
      transition: border-color 0.2s, background 0.2s;
    }

    .google-btn:hover { border-color: var(--teal); background: #00ffcc08; }

    .google-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .auth-msg {
      font-family: var(--sans);
      font-size: 11px;
      color: #ff6688;
      text-align: center;
      min-height: 16px;
      letter-spacing: 1px;
    }

    /* User panel (logged-in) */
    #user-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: #000d1888;
      border: 1px solid #00ffcc22;
      border-radius: 4px;
      padding: 24px;
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .user-welcome {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--teal);
      text-transform: uppercase;
    }

    #user-name {
      font-size: clamp(16px, 3vw, 22px);
      color: #fff;
      font-weight: 300;
    }

    .wishlist-badge {
      background: linear-gradient(135deg, #00ffcc15, #00aaff10);
      border: 1px solid #00ffcc33;
      border-radius: 20px;
      padding: 8px 20px;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--teal);
      text-transform: uppercase;
    }

    .sign-out-btn {
      background: transparent;
      border: none;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      cursor: pointer;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .sign-out-btn:hover { color: var(--text); }

    /* ── SOCIALS ── */
    .social-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-top: 36px;
    }

    .social-line {
      width: 36px;
      height: 1px;
      background: linear-gradient(to right, transparent, #00ffcc33, transparent);
      flex-shrink: 0;
    }

    .social-node {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #00ffcc33;
      background: #000d18cc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00ffcc88;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
      text-decoration: none;
    }

    .social-node--sm { font-size: 10px; }

    .social-node:hover {
      border-color: var(--teal);
      color: var(--teal);
      box-shadow: 0 0 18px #00ffcc30;
    }

    .social-node::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid #00ffcc15;
      animation: nodePulse 3s ease-in-out infinite;
    }

    @keyframes nodePulse {
      0%, 100% { transform: scale(1);   opacity: 0.4; }
      50%       { transform: scale(1.1); opacity: 1; }
    }

    .social-labels {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-top: 10px;
    }

    .social-label-spacer { width: calc(36px + 44px + 36px); flex-shrink: 0; } /* line+node+line */

    .social-label {
      width: calc(36px + 44px + 36px);
      text-align: center;
      font-family: var(--sans);
      font-size: 8px;
      letter-spacing: 2px;
      color: #00ffcc33;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── STEAM CTA ── */
    .steam-cta {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .steam-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #1b2838, #2a475e);
      border: 1px solid #4a9fc855;
      border-radius: 3px;
      padding: 14px 28px;
      color: #c6d4df;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }

    .steam-btn:hover {
      border-color: #4a9fc8aa;
      box-shadow: 0 0 24px #4a9fc820;
    }

    .steam-icon {
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }

    .steam-note {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 3px;
      color: #00ffcc22;
      text-transform: uppercase;
    }

    /* ── CONSENT & DATA NOTE ── */
    .consent-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      margin-top: 2px;
    }

    .consent-wrap input[type="checkbox"] {
      flex-shrink: 0;
      margin-top: 2px;
      width: 14px;
      height: 14px;
      accent-color: var(--teal);
      cursor: pointer;
    }

    .consent-text {
      font-family: var(--sans);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    .consent-link {
      color: var(--teal);
      opacity: 0.7;
      text-decoration: underline;
      transition: opacity 0.2s;
    }
    .consent-link:hover { opacity: 1; }

    .data-note {
      font-family: var(--sans);
      font-size: 10px;
      color: #00ffcc25;
      text-align: center;
      line-height: 1.6;
      letter-spacing: 0.3px;
      padding-top: 4px;
    }

    /* ── FOOTER ── */
    .hero-footer {
      margin-top: 48px;
      font-family: var(--sans);
      font-size: 9px;
      color: #00ffcc15;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── MODAL overlay for auth ── */
    /* (tabs handle sign-in/sign-up toggle inline, no modal needed) */

    .footer-link {
      color: #00ffcc33;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-link:hover { color: #00ffccaa; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .game-title { letter-spacing: 0.25em; }
      .social-line { width: 20px; }
      .social-label { width: calc(20px + 44px + 20px); }
      .hero-inner { padding: 0 16px 50px; }
      .eyebrow { margin-top: 36px; }
    }

    @media (max-width: 380px) {
      .game-title { font-size: 38px; letter-spacing: 0.15em; }
    }

    /* ── Shooting star animation ── */
    @keyframes shoot {
      0%   { transform: translateX(0) translateY(0); opacity: 0; }
      5%   { opacity: 1; }
      80%  { opacity: 0.6; }
      100% { transform: translateX(180px) translateY(60px); opacity: 0; }
    }
  </style>
</head>

<script>
/* ── Tab switching ── */
let activeMode = 'signin';

function switchTab(mode, btn) {
  activeMode = mode;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const submitBtn  = document.getElementById('auth-submit-btn');
  const passInput  = document.getElementById('auth-pass');

  if (mode === 'signin') {
    submitBtn.textContent  = 'Sign In & Wishlist';
    passInput.autocomplete = 'current-password';
  } else {
    submitBtn.textContent  = 'Create Account & Wishlist';
    passInput.autocomplete = 'new-password';
  }
  setMsg('');
}

function setMsg(txt, color) {
  const el = document.getElementById('auth-msg');
  el.textContent = txt;
  el.style.color = color || '#ff6688';
}

/* ── Email/pass auth ── */
async function authSubmit() {
  const sf    = window._sf;
  if (!sf) return setMsg('Firebase not initialized yet.');
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  if (!email || !pass) return setMsg('Please fill in all fields.');

  /* GDPR: require explicit consent for all auth methods */
  const consentCheck = document.getElementById('consent-check');
  if (!consentCheck || !consentCheck.checked) {
    return setMsg('Please tick the consent box to continue.');
  }

  const btn = document.getElementById('auth-submit-btn');
  btn.textContent = '…';
  btn.disabled    = true;

  try {
    if (activeMode === 'signin') {
      await sf.signInWithEmailAndPassword(sf.auth, email, pass);
    } else {
      await sf.createUserWithEmailAndPassword(sf.auth, email, pass);
    }
    setMsg('');
  } catch (err) {
    const msgs = {
      'auth/user-not-found':       'No account with that email.',
      'auth/wrong-password':       'Incorrect password.',
      'auth/email-already-in-use': 'Email already registered. Sign in instead.',
      'auth/weak-password':        'Password must be at least 6 characters.',
      'auth/invalid-email':        'Please enter a valid email.',
    };
    setMsg(msgs[err.code] || err.message);
  } finally {
    btn.disabled = false;
    switchTab(activeMode, document.querySelector('.auth-tab.active'));
  }
}

/* ── Google auth ── */
async function authGoogle() {
  const sf = window._sf;
  if (!sf) return setMsg('Firebase not initialized yet.');

  const consentCheck = document.getElementById('consent-check');
  if (!consentCheck || !consentCheck.checked) {
    return setMsg('Please tick the consent box to continue.');
  }

  try {
    await sf.signInWithPopup(sf.auth, sf.gProvider);
  } catch (err) {
    if (err.code !== 'auth/popup-closed-by-user') {
      setMsg(err.message);
    }
  }
}

/* ── Sign out ── */
async function doSignOut() {
  const sf = window._sf;
  if (sf) await sf.signOut(sf.auth);
}

/* ── Star field canvas ── */
(function() {
  const canvas = document.getElementById('starCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, stars, shooters;

  function randShooter() {
    return {
      x:   W * 0.1 + Math.random() * W * 0.8,
      y:   -80,
      vx:  (Math.random() - 0.5) * 1.0,
      vy:  2.5 + Math.random() * 3.5,
      len: 60 + Math.random() * 50,
      op:  0,
      col: ['#00ffcc','#ffffff','#00aaff'][Math.random() * 3 | 0],
    };
  }

  function init() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    stars = Array.from({ length: 280 }, () => ({
      x:   Math.random() * W,
      y:   Math.random() * H,
      r:   Math.random() * 1.3 + 0.2,
      op:  Math.random() * 0.55 + 0.2,
      tw:  Math.random() * Math.PI * 2,
      teal: Math.random() < 0.08,
    }));
    shooters = [randShooter(), randShooter(), randShooter()];
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    stars.forEach(s => {
      s.tw += 0.009;
      const t = 0.5 + 0.5 * Math.sin(s.tw);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.teal
        ? `rgba(0,255,204,${(s.op * t * 0.7).toFixed(2)})`
        : `rgba(255,255,255,${(s.op * t).toFixed(2)})`;
      ctx.fill();
    });

    shooters.forEach((s, i) => {
      s.x += s.vx; s.y += s.vy;
      s.op = Math.min(1, s.op + 0.04);
      if (s.y > H + 100) shooters[i] = randShooter();
      const a  = Math.atan2(s.vy, s.vx);
      const x0 = s.x - Math.cos(a) * s.len;
      const y0 = s.y - Math.sin(a) * s.len;
      const g  = ctx.createLinearGradient(x0, y0, s.x, s.y);
      g.addColorStop(0, 'transparent');
      g.addColorStop(1, s.col + 'bb');
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = g;
      ctx.lineWidth   = 1.5;
      ctx.globalAlpha = s.op;
      ctx.stroke();
      ctx.globalAlpha = 1;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
})();
</script>
